<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Ye Tracker | Pillows Edition</title>
    <style>
        .era-content { display: none; }
        .era-section.active .era-content { display: block; }
        .era-section.active .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-[#050505] text-slate-100 font-sans p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">BULLY<span class="text-indigo-600">TRACKER</span></h1>
                <p class="text-xs font-mono text-slate-500 uppercase">Pillows API Integration</p>
            </div>
            <div id="player-container" class="hidden bg-indigo-900/20 border border-indigo-500/30 p-3 rounded-xl flex items-center gap-4">
                <span id="now-playing" class="text-xs font-bold truncate max-w-[150px]">Select a track</span>
                <audio id="audio-player" controls class="h-8 w-48"></audio>
            </div>
        </header>

        <div id="container" class="space-y-4">
            <div class="animate-pulse text-slate-700 text-center py-20">Initializing Vault...</div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const container = document.getElementById('container');
                container.innerHTML = '';

                for (const [era, tracks] of Object.entries(data)) {
                    const section = document.createElement('div');
                    section.className = "era-section bg-[#0f0f0f] border border-white/5 rounded-2xl overflow-hidden shadow-2xl";
                    
                    section.innerHTML = `
                        <button class="w-full p-6 text-left flex justify-between items-center hover:bg-white/5 transition" onclick="this.parentElement.classList.toggle('active')">
                            <span class="text-xl font-bold tracking-tight">${era}</span>
                            <i data-lucide="chevron-down" class="chevron transition-transform text-slate-500"></i>
                        </button>
                        <div class="era-content border-t border-white/5 bg-black/40">
                            <div class="divide-y divide-white/5">
                                ${tracks.map(t => `
                                    <div class="flex justify-between items-center p-4 hover:bg-indigo-600/5 transition group">
                                        <div class="flex-1">
                                            <h4 class="font-medium text-slate-200">${t.name}</h4>
                                            <p class="text-[10px] text-slate-500 uppercase font-mono">${t.note || 'No metadata'}</p>
                                        </div>
                                        ${t.pillows_id ? `
                                            <button onclick="playTrack('${t.pillows_id}', '${t.name.replace(/'/g, "\\'")}')" 
                                                    class="bg-white text-black p-2 rounded-full hover:scale-110 transition shadow-lg">
                                                <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                                            </button>
                                        ` : '<span class="text-[10px] text-slate-700 font-bold">NO FILE</span>'}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    container.appendChild(section);
                }
                lucide.createIcons();
            } catch (e) {
                document.getElementById('container').innerHTML = `<p class="text-red-500">Failed to load data.json. Ensure the bot has run once.</p>`;
            }
        }

        function playTrack(id, name) {
            const player = document.getElementById('audio-player');
            const container = document.getElementById('player-container');
            const label = document.getElementById('now-playing');
            
            // Pillows Direct Stream URL format
            const streamUrl = `https://api.pillows.su/api/download/${id}`;
            
            label.innerText = name;
            player.src = streamUrl;
            container.classList.remove('hidden');
            player.play();
        }

        init();
    </script>
</body>
</html>
