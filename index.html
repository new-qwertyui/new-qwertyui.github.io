<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .era-content { display: none; }
        .era-section.active .era-content { display: block; }
    </style>
</head>
<body class="bg-[#0b0f19] text-white p-8">
    <h1 class="text-4xl font-black mb-8 text-indigo-500">YE TRACKER</h1>
    <div id="container" class="space-y-4">Loading data...</div>

    <script>
        async function init() {
            const response = await fetch('data.json');
            const data = await response.json();
            const container = document.getElementById('container');
            container.innerHTML = '';

            for (const [era, tracks] of Object.entries(data)) {
                const section = document.createElement('div');
                section.className = "era-section bg-[#0d1321] border border-slate-800 rounded-xl overflow-hidden";
                section.innerHTML = `
                    <button class="w-full p-6 text-left flex justify-between items-center" onclick="this.parentElement.classList.toggle('active')">
                        <span class="text-2xl font-bold">${era}</span>
                        <i data-lucide="chevron-down"></i>
                    </button>
                    <div class="era-content p-4 border-t border-slate-800 space-y-2">
                        ${tracks.map(t => `
                            <div class="flex justify-between bg-slate-900 p-3 rounded-lg">
                                <span>${t.name}</span>
                                ${t.link ? `<a href="${t.link}" class="text-indigo-400">Link</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
